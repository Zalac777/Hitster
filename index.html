<!DOCTYPE html>
<html lang="hr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Hitster · Klasična glazba</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400&family=Josefin+Sans:wght@300&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --teal: #2ebfa7;
  --teal-dark: #1d7a6b;
  --bg: #0d1a1a;
}

html, body {
  width: 100%; height: 100%;
  background: var(--bg);
  color: white;
  font-family: 'Cormorant Garamond', serif;
  overflow: hidden;
}

/* ══ LOGIN ══ */
#login-screen {
  position: fixed; inset: 0;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  background: var(--bg);
  z-index: 100; padding: 40px; text-align: center;
}
#login-screen .glow {
  position: absolute; inset: 0;
  background: radial-gradient(ellipse at 50% 30%, rgba(29,122,107,0.2) 0%, transparent 70%);
  pointer-events: none;
}
#login-screen .rings-bg {
  position: absolute; inset: 0;
  display: flex; align-items: center; justify-content: center;
  opacity: 0.15; pointer-events: none;
}
.app-title {
  font-family: 'Cormorant Garamond', serif;
  font-weight: 300; font-size: 13px;
  letter-spacing: 6px; text-transform: uppercase;
  color: var(--teal); margin-bottom: 8px;
  position: relative; z-index: 2;
}
.app-subtitle {
  font-family: 'Josefin Sans', sans-serif;
  font-weight: 300; font-size: 9px;
  letter-spacing: 3px; text-transform: uppercase;
  color: rgba(46,191,167,0.4); margin-bottom: 60px;
  position: relative; z-index: 2;
}
.login-btn {
  position: relative; z-index: 2;
  background: transparent;
  border: 1px solid var(--teal);
  color: var(--teal);
  font-family: 'Josefin Sans', sans-serif;
  font-weight: 300; font-size: 10px;
  letter-spacing: 4px; text-transform: uppercase;
  padding: 14px 36px; cursor: pointer;
  transition: all 0.3s;
}
.login-btn:hover { background: rgba(46,191,167,0.08); }

/* ══ LOADING ══ */
#loading-overlay {
  position: fixed; inset: 0;
  background: var(--bg);
  display: flex; align-items: center; justify-content: center;
  z-index: 50; flex-direction: column; gap: 16px;
}
#loading-overlay.hidden { display: none; }
.loading-dot { display: flex; gap: 6px; }
.loading-dot span {
  width: 5px; height: 5px; border-radius: 50%;
  background: var(--teal);
  animation: blink 1.2s ease-in-out infinite;
}
.loading-dot span:nth-child(2) { animation-delay: 0.2s; }
.loading-dot span:nth-child(3) { animation-delay: 0.4s; }
@keyframes blink { 0%,80%,100%{opacity:.15} 40%{opacity:1} }
.loading-text {
  font-family: 'Josefin Sans', sans-serif;
  font-size: 9px; letter-spacing: 3px; text-transform: uppercase;
  color: rgba(46,191,167,0.4);
}

/* ══ PLAYER ══ */
#player-screen {
  position: fixed; inset: 0;
  display: none; flex-direction: column;
  align-items: center; justify-content: center;
  background: var(--bg); padding: 40px 30px;
}
#player-screen.visible { display: flex; }
#player-screen::before {
  content: ''; position: absolute;
  top: 0; left: 0; right: 0; height: 4px;
  background: linear-gradient(90deg, var(--teal-dark), var(--teal), var(--teal-dark));
}
#player-screen::after {
  content: ''; position: absolute;
  bottom: 0; left: 0; right: 0; height: 4px;
  background: linear-gradient(90deg, var(--teal-dark), var(--teal), var(--teal-dark));
}
.player-glow {
  position: absolute; inset: 0;
  background: radial-gradient(ellipse at 50% 50%, rgba(29,122,107,0.12) 0%, transparent 70%);
  pointer-events: none;
}
.rings-container {
  position: absolute; inset: 0;
  display: flex; align-items: center; justify-content: center;
  pointer-events: none;
}
.rings-container svg { width: min(80vw,80vh); height: min(80vw,80vh); }

.player-content {
  position: relative; z-index: 10;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  gap: 0; width: 100%; max-width: 340px;
}

#status-text {
  font-family: 'Josefin Sans', sans-serif;
  font-weight: 300; font-size: 9px;
  letter-spacing: 4px; text-transform: uppercase;
  color: rgba(46,191,167,0.5);
  margin-bottom: 36px; min-height: 16px;
}

/* Play button */
#play-btn {
  width: 72px; height: 72px;
  border-radius: 50%;
  border: 1.5px solid var(--teal);
  background: transparent; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  transition: all 0.25s; margin-bottom: 36px; position: relative;
}
#play-btn:hover { background: rgba(46,191,167,0.08); }
#play-btn:active { transform: scale(0.95); }
#play-btn svg { width: 28px; height: 28px; fill: var(--teal); }
#play-btn.playing::before {
  content: ''; position: absolute; inset: -8px;
  border-radius: 50%; border: 1px solid rgba(46,191,167,0.25);
  animation: pulse 2s ease-in-out infinite;
}
@keyframes pulse { 0%,100%{transform:scale(1);opacity:.5} 50%{transform:scale(1.08);opacity:.15} }

/* Progress */
.progress-wrap { width: 100%; display: flex; flex-direction: column; align-items: center; gap: 10px; margin-bottom: 32px; }
#progress-bar-bg {
  width: 100%; height: 1px;
  background: rgba(46,191,167,0.2);
  position: relative; cursor: pointer;
}
#progress-bar-fill {
  position: absolute; left: 0; top: 0; bottom: 0;
  background: linear-gradient(90deg, var(--teal-dark), var(--teal));
  width: 0%; transition: width 0.5s linear;
}
#progress-bar-dot {
  position: absolute; top: 50%;
  transform: translate(-50%,-50%);
  width: 5px; height: 5px;
  border-radius: 50%; background: var(--teal);
  left: 0%; transition: left 0.5s linear;
}
.timer-row { display: flex; justify-content: space-between; width: 100%; }
.timer-text {
  font-family: 'Josefin Sans', sans-serif;
  font-weight: 300; font-size: 9px;
  letter-spacing: 2px; color: rgba(46,191,167,0.45);
}

/* Scan button */
#scan-btn {
  background: transparent;
  border: 1px solid rgba(46,191,167,0.35);
  color: rgba(46,191,167,0.6);
  font-family: 'Josefin Sans', sans-serif;
  font-weight: 300; font-size: 9px;
  letter-spacing: 3px; text-transform: uppercase;
  padding: 10px 24px; cursor: pointer;
  transition: all 0.3s; display: flex;
  align-items: center; gap: 8px;
}
#scan-btn:hover { border-color: var(--teal); color: var(--teal); background: rgba(46,191,167,0.05); }
#scan-btn svg { width: 14px; height: 14px; fill: currentColor; }

/* Error */
#error-msg {
  font-family: 'Josefin Sans', sans-serif;
  font-size: 9px; letter-spacing: 2px;
  color: rgba(255,100,100,0.7);
  text-align: center; margin-top: 16px; display: none;
}

/* ══ SCANNER OVERLAY ══ */
#scanner-overlay {
  position: fixed; inset: 0;
  background: #000;
  z-index: 200;
  display: none; flex-direction: column;
  align-items: center; justify-content: center;
}
#scanner-overlay.visible { display: flex; }

#scanner-video {
  width: 100%; height: 100%;
  object-fit: cover; position: absolute; inset: 0;
}

.scanner-ui {
  position: relative; z-index: 10;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  width: 100%; height: 100%;
}

.scanner-frame {
  width: 64vw; height: 64vw;
  max-width: 260px; max-height: 260px;
  position: relative;
}
/* Corner marks */
.scanner-frame::before, .scanner-frame::after,
.scanner-frame .corner-b::before, .scanner-frame .corner-b::after {
  content: ''; position: absolute;
  width: 24px; height: 24px;
}
.scanner-frame::before { top:0; left:0; border-top: 2px solid var(--teal); border-left: 2px solid var(--teal); }
.scanner-frame::after  { top:0; right:0; border-top: 2px solid var(--teal); border-right: 2px solid var(--teal); }
.scanner-frame .corner-b::before { bottom:0; left:0; border-bottom: 2px solid var(--teal); border-left: 2px solid var(--teal); }
.scanner-frame .corner-b::after  { bottom:0; right:0; border-bottom: 2px solid var(--teal); border-right: 2px solid var(--teal); }

/* Scan line animation */
.scan-line {
  position: absolute; left: 0; right: 0; height: 1px;
  background: linear-gradient(90deg, transparent, var(--teal), transparent);
  animation: scanline 2s ease-in-out infinite;
  top: 0;
}
@keyframes scanline { 0%,100%{top:0;opacity:1} 50%{top:100%;opacity:0.5} }

.scanner-hint {
  font-family: 'Josefin Sans', sans-serif;
  font-size: 9px; letter-spacing: 3px; text-transform: uppercase;
  color: rgba(46,191,167,0.6);
  margin-top: 32px;
}
.scanner-close {
  position: absolute; bottom: 48px;
  background: transparent;
  border: 1px solid rgba(46,191,167,0.4);
  color: rgba(46,191,167,0.6);
  font-family: 'Josefin Sans', sans-serif;
  font-size: 9px; letter-spacing: 3px; text-transform: uppercase;
  padding: 12px 28px; cursor: pointer;
}

/* Hidden embed */
#spotify-embed {
  position: fixed; bottom: -500px; left: -500px;
  width: 1px; height: 1px; opacity: 0.01; pointer-events: none;
}
</style>
</head>
<body>

<!-- LOGIN -->
<div id="login-screen">
  <div class="glow"></div>
  <svg class="rings-bg" viewBox="0 0 400 400" xmlns="http://www.w3.org/2000/svg" style="position:absolute;inset:0;width:100%;height:100%;opacity:0.15;pointer-events:none;">
    <circle cx="200" cy="200" r="160" fill="none" stroke="#2ebfa7" stroke-width="0.8"/>
    <circle cx="200" cy="200" r="130" fill="none" stroke="#2ebfa7" stroke-width="0.5"/>
    <circle cx="200" cy="200" r="100" fill="none" stroke="#2ebfa7" stroke-width="0.4"/>
    <circle cx="200" cy="40"  r="2" fill="#2ebfa7" opacity="0.6"/>
    <circle cx="360" cy="200" r="2" fill="#2ebfa7" opacity="0.6"/>
    <circle cx="200" cy="360" r="2" fill="#2ebfa7" opacity="0.6"/>
    <circle cx="40"  cy="200" r="2" fill="#2ebfa7" opacity="0.6"/>
  </svg>
  <div class="app-title">Klasična glazba</div>
  <div class="app-subtitle">Hitster · Card Game</div>
  <button class="login-btn" onclick="startLogin()">Spoji Spotify</button>
</div>

<!-- LOADING -->
<div id="loading-overlay" class="hidden">
  <div class="loading-dot"><span></span><span></span><span></span></div>
  <div class="loading-text">Učitavanje...</div>
</div>

<!-- PLAYER -->
<div id="player-screen">
  <div class="player-glow"></div>
  <div class="rings-container">
    <svg viewBox="0 0 400 400" xmlns="http://www.w3.org/2000/svg">
      <circle cx="200" cy="200" r="180" fill="none" stroke="rgba(46,191,167,0.10)" stroke-width="0.8"/>
      <circle cx="200" cy="200" r="148" fill="none" stroke="rgba(46,191,167,0.07)" stroke-width="0.5"/>
      <circle cx="200" cy="200" r="116" fill="none" stroke="rgba(46,191,167,0.05)" stroke-width="0.4"/>
      <circle cx="200" cy="20"  r="2.5" fill="rgba(46,191,167,0.4)"/>
      <circle cx="380" cy="200" r="2.5" fill="rgba(46,191,167,0.4)"/>
      <circle cx="200" cy="380" r="2.5" fill="rgba(46,191,167,0.4)"/>
      <circle cx="20"  cy="200" r="2.5" fill="rgba(46,191,167,0.4)"/>
    </svg>
  </div>

  <div class="player-content">
    <div id="status-text">Skeniraj karticu</div>

    <button id="play-btn" onclick="togglePlay()">
      <svg id="play-icon" viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
    </button>

    <div class="progress-wrap">
      <div id="progress-bar-bg" onclick="seekTo(event)">
        <div id="progress-bar-fill"></div>
        <div id="progress-bar-dot"></div>
      </div>
      <div class="timer-row">
        <span class="timer-text" id="time-current">0:00</span>
        <span class="timer-text" id="time-total">–:––</span>
      </div>
    </div>

    <button id="scan-btn" onclick="openScanner()">
      <svg viewBox="0 0 24 24"><path d="M3 11h8V3H3v8zm2-6h4v4H5V5zM3 21h8v-8H3v8zm2-6h4v4H5v-4zM13 3v8h8V3h-8zm6 6h-4V5h4v4zM13 13h2v2h-2zM15 15h2v2h-2zM13 17h2v2h-2zM17 13h2v2h-2zM19 15h2v2h-2zM17 17h2v2h-2zM19 19h2v2h-2zM15 19h2v2h-2zM13 21h2v-2h-2z"/></svg>
      Skeniraj karticu
    </button>

    <div id="error-msg"></div>
  </div>
</div>

<!-- SCANNER OVERLAY -->
<div id="scanner-overlay">
  <video id="scanner-video" playsinline autoplay muted></video>
  <div class="scanner-ui">
    <div class="scanner-frame">
      <div class="corner-b"></div>
      <div class="scan-line"></div>
    </div>
    <div class="scanner-hint">Usmjeri kameru na QR kod</div>
  </div>
  <button class="scanner-close" onclick="closeScanner()">Zatvori</button>
</div>

<!-- Hidden Spotify embed fallback -->
<iframe id="spotify-embed" allow="autoplay; clipboard-write; encrypted-media; fullscreen; picture-in-picture" loading="lazy"></iframe>

<script src="https://sdk.scdn.co/spotify-player.js"></script>
<script>
const CLIENT_ID   = '8d30d87a42a148afa5faee562be17fe5';
const REDIRECT_URI = 'https://zalac777.github.io/Hitster/callback';
const SCOPES = 'streaming user-read-email user-read-private user-read-playback-state user-modify-playback-state';

// ── TRACK ID ──
function getTrackId() {
  return new URLSearchParams(window.location.search).get('t') || '';
}

// ── PKCE ──
async function generateCodeVerifier() {
  const arr = new Uint8Array(64);
  crypto.getRandomValues(arr);
  return btoa(String.fromCharCode(...arr)).replace(/\+/g,'-').replace(/\//g,'_').replace(/=/g,'');
}
async function generateCodeChallenge(v) {
  const data = new TextEncoder().encode(v);
  const digest = await crypto.subtle.digest('SHA-256', data);
  return btoa(String.fromCharCode(...new Uint8Array(digest))).replace(/\+/g,'-').replace(/\//g,'_').replace(/=/g,'');
}

// ── AUTH ──
async function startLogin() {
  const verifier = await generateCodeVerifier();
  const challenge = await generateCodeChallenge(verifier);
  const state = Math.random().toString(36).slice(2);
  sessionStorage.setItem('pkce_verifier', verifier);
  sessionStorage.setItem('spotify_state', state);
  sessionStorage.setItem('pending_track', getTrackId());
  const url = `https://accounts.spotify.com/authorize?client_id=${CLIENT_ID}&response_type=code&redirect_uri=${encodeURIComponent(REDIRECT_URI)}&scope=${encodeURIComponent(SCOPES)}&state=${state}&code_challenge_method=S256&code_challenge=${challenge}`;
  window.location = url;
}

function getStoredToken() {
  const token = sessionStorage.getItem('spotify_token');
  const expiry = sessionStorage.getItem('spotify_expiry');
  if (token && expiry && Date.now() < parseInt(expiry)) return token;
  return null;
}

// ── STATE ──
let player = null, deviceId = null, token = null;
let isPlaying = false, duration = 0, position = 0;
let progressInterval = null;
let embedMode = false, embedTimer = null, embedPosition = 0, embedDuration = 30000;
let currentTrackId = '';
let scannerStream = null;
let barcodeDetector = null;

// ── UTILS ──
function fmt(ms) {
  const s = Math.floor(ms/1000);
  return `${Math.floor(s/60)}:${String(s%60).padStart(2,'0')}`;
}
function setStatus(t) { document.getElementById('status-text').textContent = t; }
function setPlayIcon(playing) {
  isPlaying = playing;
  const btn = document.getElementById('play-btn');
  const icon = document.getElementById('play-icon');
  btn.classList.toggle('playing', playing);
  icon.innerHTML = playing
    ? '<path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/>'
    : '<path d="M8 5v14l11-7z"/>';
}
function updateProgress(pos, dur) {
  position = pos; duration = dur;
  const pct = dur > 0 ? (pos/dur)*100 : 0;
  document.getElementById('progress-bar-fill').style.width = pct + '%';
  document.getElementById('progress-bar-dot').style.left = pct + '%';
  document.getElementById('time-current').textContent = fmt(pos);
  document.getElementById('time-total').textContent = dur > 0 ? fmt(dur) : '–:––';
}
function showError(msg) {
  const el = document.getElementById('error-msg');
  el.textContent = msg; el.style.display = 'block';
  setTimeout(() => el.style.display = 'none', 4000);
}
function seekTo(e) {
  if (duration === 0) return;
  const bar = document.getElementById('progress-bar-bg');
  const rect = bar.getBoundingClientRect();
  const pct = Math.max(0, Math.min(1, (e.clientX - rect.left) / rect.width));
  if (player && !embedMode) player.seek(Math.floor(pct * duration));
}

// ── PLAY TRACK ──
async function playTrack(trackId) {
  if (!trackId) return;
  currentTrackId = trackId;

  if (embedMode) {
    loadEmbed(trackId);
    return;
  }
  if (!deviceId) return;

  setStatus('Učitavanje...');
  try {
    const res = await fetch(`https://api.spotify.com/v1/me/player/play?device_id=${deviceId}`, {
      method: 'PUT',
      headers: { 'Authorization': `Bearer ${token}`, 'Content-Type': 'application/json' },
      body: JSON.stringify({ uris: [`spotify:track:${trackId}`], position_ms: 0 }),
    });
    if (!res.ok) {
      // 403 = Free account ili Premium problem → embed fallback
      if (res.status === 403 || res.status === 401) {
        switchToEmbed();
      } else {
        showError('Nije moguće učitati pjesmu (' + res.status + ')');
      }
    }
  } catch(e) {
    switchToEmbed();
  }
}

// ── TOGGLE PLAY ──
function togglePlay() {
  if (embedMode) {
    if (isPlaying) {
      clearInterval(embedTimer);
      setPlayIcon(false);
      setStatus('Pauza');
    } else {
      startEmbedTimer();
      setPlayIcon(true);
      setStatus('Svira');
    }
    return;
  }
  if (player) player.togglePlay();
}

// ── EMBED FALLBACK ──
function loadEmbed(trackId) {
  clearInterval(embedTimer);
  embedPosition = 0;
  embedDuration = 30000;
  const iframe = document.getElementById('spotify-embed');
  iframe.src = `https://open.spotify.com/embed/track/${trackId}?autoplay=1&theme=0`;
  setTimeout(() => {
    setPlayIcon(true);
    setStatus('Svira');
    updateProgress(0, embedDuration);
    startEmbedTimer();
  }, 1500);
}
function startEmbedTimer() {
  clearInterval(embedTimer);
  embedTimer = setInterval(() => {
    embedPosition += 500;
    updateProgress(embedPosition, embedDuration);
    if (embedPosition >= embedDuration) {
      clearInterval(embedTimer);
      setPlayIcon(false);
      setStatus('Skeniraj karticu');
      updateProgress(0, embedDuration);
    }
  }, 500);
}
function switchToEmbed(trackId) {
  embedMode = true;
  document.getElementById('loading-overlay').classList.add('hidden');
  document.getElementById('player-screen').classList.add('visible');
  const tid = trackId || currentTrackId || getTrackId() || sessionStorage.getItem('pending_track');
  if (tid) {
    loadEmbed(tid);
  } else {
    setStatus('Skeniraj karticu');
  }
}

// ── SCANNER ──
async function openScanner() {
  const overlay = document.getElementById('scanner-overlay');
  overlay.classList.add('visible');

  try {
    scannerStream = await navigator.mediaDevices.getUserMedia({
      video: { facingMode: 'environment' }
    });
    document.getElementById('scanner-video').srcObject = scannerStream;

    // Try BarcodeDetector API (Chrome Android, Safari 17+)
    if ('BarcodeDetector' in window) {
      barcodeDetector = new BarcodeDetector({ formats: ['qr_code'] });
      scanFrame();
    } else {
      // Fallback — koristimo ZXing library
      loadZXing();
    }
  } catch(e) {
    closeScanner();
    showError('Nema pristupa kameri');
  }
}

function closeScanner() {
  document.getElementById('scanner-overlay').classList.remove('visible');
  if (scannerStream) {
    scannerStream.getTracks().forEach(t => t.stop());
    scannerStream = null;
  }
}

async function scanFrame() {
  if (!scannerStream) return;
  const video = document.getElementById('scanner-video');
  if (video.readyState === video.HAVE_ENOUGH_DATA) {
    try {
      const barcodes = await barcodeDetector.detect(video);
      if (barcodes.length > 0) {
        const val = barcodes[0].rawValue;
        handleScan(val);
        return;
      }
    } catch(e) {}
  }
  requestAnimationFrame(scanFrame);
}

function loadZXing() {
  const script = document.createElement('script');
  script.src = 'https://unpkg.com/@zxing/library@0.19.1/umd/index.min.js';
  script.onload = () => {
    const codeReader = new ZXing.BrowserQRCodeReader();
    const video = document.getElementById('scanner-video');
    codeReader.decodeFromVideoElement(video, (result, err) => {
      if (result) {
        handleScan(result.getText());
        codeReader.reset();
      }
    });
  };
  document.head.appendChild(script);
}

function handleScan(value) {
  closeScanner();
  // Izvuci track ID iz našeg URL-a
  // Očekujemo: https://zalac777.github.io/Hitster/?t=TRACK_ID
  let trackId = '';
  try {
    const url = new URL(value);
    trackId = url.searchParams.get('t') || '';
  } catch(e) {
    // Možda je direktno track ID
    trackId = value;
  }

  if (trackId) {
    // Ažuriraj URL bez reload-a
    window.history.replaceState({}, '', `?t=${trackId}`);
    setStatus('Učitavanje...');
    updateProgress(0, 0);
    playTrack(trackId);
  } else {
    showError('QR kod nije valjan');
  }
}

// ── SPOTIFY SDK ──
window.onSpotifyWebPlaybackSDKReady = () => {
  player = new Spotify.Player({
    name: 'Hitster Klasična',
    getOAuthToken: cb => cb(token),
    volume: 0.8,
  });

  player.addListener('ready', ({ device_id }) => {
    deviceId = device_id;
    document.getElementById('loading-overlay').classList.add('hidden');
    document.getElementById('player-screen').classList.add('visible');
    setStatus('Skeniraj karticu');
    const trackId = getTrackId() || sessionStorage.getItem('pending_track');
    if (trackId) playTrack(trackId);
  });

  player.addListener('not_ready', () => setStatus('Player nije dostupan'));

  player.addListener('player_state_changed', state => {
    if (!state) return;
    setPlayIcon(!state.paused);
    updateProgress(state.position, state.duration);
    clearInterval(progressInterval);
    if (!state.paused) {
      progressInterval = setInterval(() => {
        position += 500;
        updateProgress(position, duration);
      }, 500);
    }
    if (state.paused && state.position === 0) setStatus('Skeniraj karticu');
    else if (state.paused) setStatus('Pauza');
    else setStatus('Svira');
  });

  player.addListener('initialization_error', () => switchToEmbed(currentTrackId));
  player.addListener('authentication_error', () => {
    sessionStorage.removeItem('spotify_token');
    sessionStorage.removeItem('spotify_expiry');
    window.location.replace('https://zalac777.github.io/Hitster/');
  });
  player.addListener('account_error', () => switchToEmbed(currentTrackId));

  setTimeout(() => { if (!deviceId) switchToEmbed(currentTrackId); }, 8000);
  player.connect();
};

// ── INIT ──
function init() {
  token = getStoredToken();
  if (token) {
    document.getElementById('login-screen').style.display = 'none';
    document.getElementById('loading-overlay').classList.remove('hidden');
  } else {
    document.getElementById('login-screen').style.display = 'flex';
    sessionStorage.setItem('pending_track', getTrackId());
  }
}

init();
</script>
