<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Hitster · Prijava...</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body {
  background: #0d1a1a;
  display: flex;
  align-items: center;
  justify-content: center;
  height: 100vh;
  font-family: sans-serif;
}
.dot { display:flex; gap:6px; }
.dot span {
  width:6px; height:6px;
  border-radius:50%;
  background:#2ebfa7;
  animation: blink 1.2s ease-in-out infinite;
}
.dot span:nth-child(2) { animation-delay:.2s; }
.dot span:nth-child(3) { animation-delay:.4s; }
@keyframes blink {
  0%,80%,100% { opacity:.15; }
  40% { opacity:1; }
}
</style>
</head>
<body>
<div class="dot"><span></span><span></span><span></span></div>
<script>
// Parse token from hash
const hash = window.location.hash.substring(1);
const params = new URLSearchParams(hash);
const token = params.get('access_token');
const expiresIn = params.get('expires_in');

if (token) {
  const expiry = Date.now() + (parseInt(expiresIn) || 3600) * 1000;
  sessionStorage.setItem('spotify_token', token);
  sessionStorage.setItem('spotify_expiry', expiry.toString());

  // Get track from state or pending
  const trackId = sessionStorage.getItem('pending_track') || '';
  const redirect = trackId
    ? `https://zalac777.github.io/hitster/?t=${trackId}`
    : `https://zalac777.github.io/hitster/`;
  window.location.replace(redirect);
} else {
  // No token — back to start
  window.location.replace('https://zalac777.github.io/hitster/');
}
</script>
</body>
</html>
